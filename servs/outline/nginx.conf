server {
    listen 80;
    listen [::]:80;

    server_name out.doc.duvanoff.su www.out.doc.duvanoff.su;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name out.doc.duvanoff.su www.out.doc.duvanoff.su;

    charset utf-8;
    access_log off;

    ssl_certificate /etc/letsencrypt/live/out.doc.duvanoff.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/out.doc.duvanoff.su/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    keepalive_timeout 70;

    client_max_body_size 100M;

    location / {
        proxy_pass http://outline:3000;

        # Обязательные заголовки для Outline
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Важно для WebSocket и больших ответов
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300;
        proxy_send_timeout 300;
        proxy_buffering off;
    }
}

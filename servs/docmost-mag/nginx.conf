server {
    listen 80;
    listen [::]:80;

    server_name mag.duvanoff.su www.mag.duvanoff.su;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name mag.duvanoff.su www.mag.duvanoff.su;

    charset utf-8;
    access_log off;

    ssl_certificate /etc/letsencrypt/live/mag.duvanoff.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mag.duvanoff.su/privkey.pem;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    keepalive_timeout 70;

    location / {
        proxy_pass http://docmost-mag:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

services:
  cloud-config:
    image: alpine:latest
    container_name: cloud-config
    volumes:
      - type: bind
        source: ../../php/config.php
        target: /source/config.php
      - type: volume
        source: cloud-data
        target: /var/www/html
    command: >
      sh -c "
        mkdir -p /var/www/html/config &&
        if [ ! -f /var/www/html/config/config.php ]; then
          cat /source/config.php >> /var/www/html/config/config.php &&
          echo 'config.php создан';
        fi
      "
    restart: "no"

  cloud-db:
    image: postgres
    container_name: cloud-db
    volumes:
      - type: volume
        source: db-data
        target: /var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${CLOUD_POSTGRES_DB}
      - POSTGRES_USER=${CLOUD_POSTGRES_USER}
      - POSTGRES_PASSWORD=${CLOUD_POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${CLOUD_POSTGRES_DB}", "-U", "${CLOUD_POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - cloud_network
    expose:
      - '5432'
    restart: unless-stopped

  cloud-redis:
    image: redis
    container_name: cloud-redis
    volumes:
      - type: volume
        source: redis-data
        target: /data
    networks:
      - cloud_network
    expose:
      - '6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  cloud:
    image: nextcloud:latest
    container_name: cloud
    environment:
      - POSTGRES_HOST=cloud-db
      - POSTGRES_DB=${CLOUD_POSTGRES_DB}
      - POSTGRES_USER=${CLOUD_POSTGRES_USER}
      - POSTGRES_PASSWORD=${CLOUD_POSTGRES_PASSWORD}
      - REDIS_HOST=cloud-redis
      - NEXTCLOUD_ADMIN_USER=${CLOUD_ADMIN_USERNAME}
      - NEXTCLOUD_ADMIN_PASSWORD=${CLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.duvanoff.su
      - OVERWRITECLIURL=https://cloud.duvanoff.su
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=cloud.duvanoff.su
    volumes:
      - type: volume
        source: cloud-data
        target: /var/www/html
    networks:
      - cloud_network
      - office-network
      - nginx-network
    expose:
      - '80'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      cloud-config:
        condition: service_completed_successfully
      cloud-db:
        condition: service_healthy
      cloud-redis:
        condition: service_healthy
    restart: unless-stopped

  office-db:
    image: postgres
    container_name: office-db
    environment:
      - POSTGRES_DB=${OFFICE_POSTGRES_DB}
      - POSTGRES_USER=${OFFICE_POSTGRES_USER}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - type: volume
        source: db-office-data
        target: /var/lib/postgresql/data
    networks:
      - office-network
    expose:
      - '5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  office-redis:
    image: redis
    container_name: office-redis
    volumes:
      - type: volume
        source: redis-office-data
        target: /data
    networks:
      - office-network
    expose:
      - '6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  office-rabbitmq:
    image: rabbitmq
    container_name: office-rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${OFFICE_RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${OFFICE_RABBITMQ_PASSWORD}
    networks:
      - office-network
    expose:
      - '5672'
      - '15672'
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  office:
    image: onlyoffice/documentserver
    container_name: office
    environment:
      - DB_TYPE=postgres
      - DB_HOST=office-db
      - DB_PORT=5432
      - DB_NAME=${OFFICE_POSTGRES_DB}
      - DB_USER=${OFFICE_POSTGRES_USER}
      - DB_PWD=${OFFICE_POSTGRES_PASSWORD}
      - AMQP_TYPE=rabbitmq
      - AMQP_URI=amqp://${OFFICE_RABBITMQ_USER}:${OFFICE_RABBITMQ_PASSWORD}@office-rabbitmq
      - REDIS_SERVER_HOST=office-redis
      - REDIS_SERVER_PORT=6379
      - JWT_ENABLED=true
      - JWT_SECRET=${OFFICE_JWT_SECRET}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY='true'
      - WOPI_ENABLED=true
    volumes:
      - type: volume
        source: office-data
        target: /var/www/onlyoffice/Data
      - type: volume
        source: office-log
        target: /var/log/onlyoffice
      - type: volume
        source: office-cache
        target: /var/lib/onlyoffice/documentserver/App_Data/cache/files
      - type: volume
        source: office-public
        target: /var/www/onlyoffice/documentserver-example/public/files
      - type: volume
        source: office-fonts
        target: /usr/share/fonts
    networks:
      - office-network
      - cloud_network
      - nginx-network
    expose:
      - '80'
      - '443'
    depends_on:
      office-db:
        condition: service_healthy
      office-rabbitmq:
        condition: service_healthy
    restart: unless-stopped

networks:
  cloud_network:
    driver: bridge
  office-network:
    driver: bridge
  nginx-network:
    external: true
    name: ${COMMON_NAME}_nginx-network

volumes:
  db-data:
    name: ${COMMON_NAME}_db-data
  redis-data:
    name: ${COMMON_NAME}_redis-data
  cloud-data:
    name: ${COMMON_NAME}_cloud-data
  db-office-data:
    name: ${COMMON_NAME}_db-office-data
  redis-office-data:
    name: ${COMMON_NAME}_redis-office-data
  office-data:
    name: ${COMMON_NAME}_office-data
  office-log:
    name: ${COMMON_NAME}_office-log
  office-cache:
    name: ${COMMON_NAME}_office-cache
  office-public:
    name: ${COMMON_NAME}_office-public
  office-fonts:
    name: ${COMMON_NAME}_office-fonts
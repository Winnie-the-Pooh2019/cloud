events {}

http {
    server {
        listen 80;
        listen [::]:80;

        server_name cloud.duvanoff.su www.cloud.duvanoff.su;

        location /.well-known/acme-challenge/ {
            root /data/letsencrypt;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name cloud.duvanoff.su;

        ssl_certificate /etc/letsencrypt/live/cloud.duvanoff.su/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cloud.duvanoff.su/privkey.pem;

        location / {
            proxy_pass http://nextcloud_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            client_max_body_size 10G;
        }
    }
}

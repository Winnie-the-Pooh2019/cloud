services:
  nginx-setup:
    image: nginx:latest
    container_name: nginx-setup
    ports:
      - '80:80'
    volumes:
      - type: bind
        source: ./nginx/setup/conf.d
        target: /etc/nginx/conf.d
      - type: volume
        source: web-root
        target: /var/www/certbot
      - type: volume
        source: certbot-etc
        target: /etc/letsencrypt
      - type: volume
        source: certbot-var
        target: /var/lib/letsencrypt

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - type: volume
        source: certbot-etc
        target: /etc/letsencrypt
      - type: volume
        source: certbot-var
        target: /var/lib/letsencrypt
      - type: volume
        source: web-root
        target: /var/www/certbot

  php-config:
    image: alpine:latest
    container_name: php-config
    volumes:
      - type: bind
        source: ./php/config.php
        target: /source/config.php
      - type: volume
        source: cloud-data
        target: /data
    command: > 
      sh -c "cp /source/config.php /data/config.php"
      
  backup:
    image: backup
    container_name: backup
    build:
      context: ./backup
      dockerfile: ./Dockerfile

volumes:
  cloud-data:
    driver: local
    name: cloud_cloud-data
  certbot-etc:
    driver: local
    name: cloud_certbot-etc
  certbot-var:
    driver: local
    name: cloud_certbot-var
  web-root:
    driver: local
    name: cloud_web-root
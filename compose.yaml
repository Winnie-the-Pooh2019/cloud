version: "3.8"

services:
  backup:
    container_name: backup
    build:
      context: ./backup
      dockerfile: ./Dockerfile
    volumes:
      - type: volume
        source: db-data
        target: /cloud/dist/db-data
      - type: volume
        source: cloud-data
        target: /cloud/dist/cloud-data
      - type: volume
        source: db-office-data
        target: /cloud/dist/db-office-data
      - type: volume
        source: office-data
        target: /cloud/dist/office-data
      - type: volume
        source: office-public
        target: /cloud/dist/office-public
      - type: volume
        source: office-fonts
        target: /cloud/dist/office-fonts
      - type: volume
        source: track-data
        target: /cloud/dist/track-data

  db:
    image: postgres
    container_name: db
    user: '1000:1000'
    volumes:
      - type: volume
        source: cloud_db-data
        target: /var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${CLOUD_POSTGRES_DB}
      - POSTGRES_USER=${CLOUD_POSTGRES_USER}
      - POSTGRES_PASSWORD=${CLOUD_POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "${CLOUD_POSTGRES_DB}", "-U", "${CLOUD_POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - cloud_network
    expose:
      - '5432'
    restart: unless-stopped

  redis:
    image: redis
    container_name: redis
    volumes:
      - type: volume
        source: redis-data
        target: /data
    networks:
      - cloud_network
    expose:
      - '6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  cloud:
    image: nextcloud:latest
    container_name: cloud
    user: '1000:1000'
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${CLOUD_POSTGRES_DB}
      - POSTGRES_USER=${CLOUD_POSTGRES_USER}
      - POSTGRES_PASSWORD=${CLOUD_POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${CLOUD_ADMIN_USERNAME}
      - NEXTCLOUD_ADMIN_PASSWORD=${CLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=cloud.duvanoff.su
      - OVERWRITECLIURL=https://cloud.duvanoff.su
      - OVERWRITEPROTOCOL=https
      - OVERWRITEHOST=cloud.duvanoff.su
    volumes:
      - type: volume
        source: cloud_cloud-data
        target: /var/www/html
    networks:
      - cloud_network
      - office-network
      - nginx-network
    expose:
      - '80'
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:80/" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db-office:
    image: postgres
    container_name: db-office
    user: '1000:1000'
    environment:
      - POSTGRES_DB=${OFFICE_POSTGRES_DB}
      - POSTGRES_USER=${OFFICE_POSTGRES_USER}
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - type: volume
        source: cloud_db-office-data
        target: /var/lib/postgresql/data
    networks:
      - office-network
    expose:
      - '5432'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  redis-office:
    image: redis
    container_name: redis-office
    volumes:
      - type: volume
        source: redis-office-data
        target: /data
    networks:
      - office-network
    expose:
      - '6379'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  rabbitmq-office:
    image: rabbitmq
    container_name: rabbitmq-office
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
    networks:
      - office-network
    expose:
      - '5672'
      - '15672'
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  office:
    image: onlyoffice/documentserver
    container_name: office
    user: '1000:1000'
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db-office
      - DB_PORT=5432
      - DB_NAME=${OFFICE_POSTGRES_DB}
      - DB_USER=${OFFICE_POSTGRES_USER}
      - DB_PWD=${OFFICE_POSTGRES_PASSWORD}
      - AMQP_TYPE=rabbitmq
      - AMQP_URI=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq-office
      - REDIS_SERVER_HOST=redis-office
      - REDIS_SERVER_PORT=6379
      - JWT_ENABLED=true
      - JWT_SECRET=${OFFICE_JWT_SECRET}
      - JWT_HEADER=Authorization
      - JWT_IN_BODY='true'
      - WOPI_ENABLED=true
    volumes:
      - type: volume
        source: cloud_office-data
        target: /var/www/onlyoffice/Data
      - type: volume
        source: office-log
        target: /var/log/onlyoffice
      - type: volume
        source: office-cache
        target: /var/lib/onlyoffice/documentserver/App_Data/cache/files
      - type: volume
        source: cloud_office-public
        target: /var/www/onlyoffice/documentserver-example/public/files
      - type: volume
        source: cloud_office-fonts
        target: /usr/share/fonts
    networks:
      - office-network
      - cloud_network
      - nginx-network
    expose:
      - '80'
      - '443'
    depends_on:
      db-office:
        condition: service_healthy
      rabbitmq-office:
        condition: service_healthy
    restart: unless-stopped

  track:
    image: jetbrains/youtrack:2025.1.64291
    container_name: track
    user: '1000:1000'
    environment:
      - YT_BASE_URL=${TRACK_URL}
    volumes:
      - type: volume
        source: cloud_track-data
        target: /opt/youtrack/data
      - type: volume
        source: track-logs
        target: /opt/youtrack/logs
    networks:
      - nginx-network
    ports:
      - '8080:8080'
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx
    networks:
      - nginx-network
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - type: bind
        source: ./nginx/prod/nginx.conf
        target: /etc/nginx/nginx.conf
      - type: bind
        source: ./nginx/prod/conf.d
        target: /etc/nginx/conf.d
      - type: volume
        source: web-root
        target: /var/www/certbot
      - type: volume
        source: certbot-etc
        target: /etc/letsencrypt
      - type: volume
        source: certbot-var
        target: /var/lib/letsencrypt
    depends_on:
      office:
        condition: service_started
    restart: unless-stopped

networks:
  cloud_network:
  office-network:
  nginx-network:

volumes:
  cloud_db-data:
    external: true
  redis-data:
    driver: local
  cloud_cloud-data:
    external: true
  cloud_db-office-data:
    external: true
  redis-office-data:
    driver: local
  cloud_office-data:
    external: true
  office-log:
    driver: local
  office-cache:
    driver: local
  cloud_office-public:
    external: true
  cloud_office-fonts:
    external: true
  cloud_track-data:
    external: true
  track-logs:
    driver: local
  web-root:
    driver: local
  certbot-etc:
    driver: local
  certbot-var:
    driver: local
